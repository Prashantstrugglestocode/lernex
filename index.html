<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Prashant Kumar" />
  <meta name="description" content="lernex — gamified linux, OS, networking, and bash. by Prashant Kumar." />
  <meta name="theme-color" content="#0b0b0c" />
  <title>lernex · learn linux/os/bash without dying of boredom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Major+Mono+Display&family=VT323&display=swap" rel="stylesheet">

  <!-- React + Babel via CDN (no build step — just open this file) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <!-- App data (sets window.DATA) -->
  <script src="data.js?v=3"></script>
</head>

<body>
  <div id="root"></div>

  <!-- ================================================================
       REACT APP — inline so it works opening this file directly
       (no XHR for the JSX file, no local server needed)
       ================================================================ -->
  <script type="text/babel" data-presets="react">

  const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

  // ============================================================
  //  SOUND ENGINE — synthesized via Web Audio, zero assets
  // ============================================================
  const SOUND_KEY = 'lernex_sound_v1';
  let _ac = null;
  const getAC = () => {
    if (_ac) return _ac;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;
    _ac = new Ctx();
    return _ac;
  };
  const blip = (freq, dur = 0.08, type = 'square', vol = 0.05) => {
    const ac = getAC(); if (!ac) return;
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + dur);
  };
  const SOUNDS = {
    xp:      () => { blip(660, 0.05, 'square'); setTimeout(() => blip(880, 0.06, 'square'), 40); },
    correct: () => { blip(523, 0.06); setTimeout(() => blip(659, 0.06), 60); setTimeout(() => blip(784, 0.1), 120); },
    wrong:   () => { blip(220, 0.12, 'sawtooth', 0.04); setTimeout(() => blip(150, 0.18, 'sawtooth', 0.04), 80); },
    flip:    () => { blip(420, 0.04, 'triangle', 0.03); },
    click:   () => { blip(880, 0.02, 'square', 0.025); },
    levelUp: () => {
      const notes = [523, 659, 784, 1046];
      notes.forEach((n, i) => setTimeout(() => blip(n, 0.18, 'triangle', 0.06), i * 90));
    },
    streak:  () => { blip(720, 0.06, 'triangle'); setTimeout(() => blip(960, 0.1, 'triangle'), 70); },
  };

  const SoundCtx = createContext({ on: true, play: () => {}, toggle: () => {} });
  function SoundProvider({ children }) {
    const [on, setOn] = useState(() => {
      try { const v = localStorage.getItem(SOUND_KEY); return v === null ? true : v === '1'; } catch { return true; }
    });
    useEffect(() => { try { localStorage.setItem(SOUND_KEY, on ? '1' : '0'); } catch {} }, [on]);
    const play = useCallback((name) => { if (!on) return; const fn = SOUNDS[name]; if (fn) try { fn(); } catch {} }, [on]);
    const toggle = useCallback(() => setOn(v => !v), []);
    return <SoundCtx.Provider value={{ on, play, toggle }}>{children}</SoundCtx.Provider>;
  }
  const useSound = () => useContext(SoundCtx);

  // ============================================================
  //  CONFETTI
  // ============================================================
  const fireConfetti = (opts = {}) => {
    if (typeof window.confetti !== 'function') return;
    window.confetti({
      particleCount: 90, spread: 75, origin: { y: 0.6 },
      colors: ['#5af78e', '#7dffac', '#ffc857', '#ff7ab8', '#7dd3fc'],
      scalar: 0.9, ticks: 200, ...opts,
    });
  };
  const fireLevelConfetti = () => {
    if (typeof window.confetti !== 'function') return;
    const burst = (x, delay) => setTimeout(() => window.confetti({
      particleCount: 70, spread: 80, origin: { x, y: 0.5 },
      colors: ['#5af78e', '#7dffac', '#ffc857', '#ff7ab8'], scalar: 1.05, ticks: 240,
    }), delay);
    burst(0.2, 0); burst(0.8, 120); burst(0.5, 240);
  };

  // ============================================================
  //  STATE HELPERS
  // ============================================================
  const STORAGE_KEY = 'lernex_v1';

  const defaultState = () => ({
    xp: 0,
    cardsSeen: {},
    quizCorrect: 0,
    quizSeen: 0,
    termDone: {},
    bashDone: {},
    portsRounds: 0,
    fsVisited: {},
    streak: 0,
    lastActive: null,
    milestonesHit: {},
  });

  const loadState = () => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      return { ...defaultState(), ...JSON.parse(raw) };
    } catch { return defaultState(); }
  };

  const persist = (s) => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
  };

  const todayStr = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };
  const dayDiff = (a, b) => Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00')) / 86400000);

  const pick = (a) => a[Math.floor(Math.random()*a.length)];
  const shuffle = (arr) => {
    const a = arr.slice();
    for (let i = a.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  };

  const levelFor = (xp) => {
    let cur = DATA.levels[0];
    for (const l of DATA.levels) if (xp >= l.xp) cur = l;
    return cur;
  };
  const nextLevel = (xp) => DATA.levels.find(l => l.xp > xp) || null;

  // ============================================================
  //  GAME STATE HOOK
  // ============================================================
  function useGame() {
    const [state, setStateRaw] = useState(loadState);
    const [toast, setToast] = useState(null);   // {msg, kind}
    const [levelUp, setLevelUp] = useState(null); // {rank, lvl}
    const toastTimer = useRef(null);
    const stateRef = useRef(state);
    useEffect(() => { stateRef.current = state; }, [state]);

    const setState = useCallback((updater) => {
      setStateRaw(prev => {
        const next = typeof updater === 'function' ? updater(prev) : updater;
        persist(next);
        return next;
      });
    }, []);

    const showToast = useCallback((msg, kind = '', dur = 1700) => {
      setToast({ msg, kind });
      clearTimeout(toastTimer.current);
      toastTimer.current = setTimeout(() => setToast(null), dur);
    }, []);

    // Streak bump (runs on every XP gain)
    const bumpStreakInPlace = (s) => {
      const today = todayStr();
      if (s.lastActive === today) return s;
      let streak = s.streak;
      if (s.lastActive) {
        const diff = dayDiff(s.lastActive, today);
        if (diff === 1) streak += 1;
        else if (diff > 1) streak = 1;
      } else {
        streak = 1;
      }
      const milestonesHit = { ...s.milestonesHit };
      let xp = s.xp;
      const milestoneMsgs = [];
      for (const m of DATA.streakMilestones) {
        if (streak >= m.days && !milestonesHit[m.days]) {
          milestonesHit[m.days] = true;
          xp += m.xp;
          milestoneMsgs.push({ msg: `🔥 ${m.msg}  +${m.xp} xp`, kind: 'xp' });
        }
      }
      if (milestoneMsgs.length) {
        // show after a short delay so the XP toast lands first
        setTimeout(() => milestoneMsgs.forEach((m, i) =>
          setTimeout(() => showToast(m.msg, m.kind, 4200), i * 4400)
        ), 200);
      }
      return { ...s, streak, lastActive: today, milestonesHit, xp };
    };

    const addXP = useCallback((amount, opts = {}) => {
      setState(prev => {
        const before = levelFor(prev.xp).lvl;
        let next = { ...prev, xp: prev.xp + amount };
        if (!opts.skipStreak) next = bumpStreakInPlace(next);
        const after = levelFor(next.xp).lvl;
        if (after > before) {
          const lvl = levelFor(next.xp);
          setTimeout(() => setLevelUp({ rank: lvl.name, lvl: lvl.lvl }), 300);
        }
        return next;
      });
    }, [setState]);

    const reset = useCallback(() => {
      const fresh = defaultState();
      setState(fresh);
      showToast('progress wiped. fresh start ✨', 'xp');
    }, [setState, showToast]);

    return { state, setState, addXP, showToast, toast, levelUp, setLevelUp, reset };
  }

  // ============================================================
  //  TOP BAR
  // ============================================================
  function TopBar({ state, onReset }) {
    const sound = useSound();
    const cur = levelFor(state.xp);
    const nxt = nextLevel(state.xp);
    const xpFromCur = state.xp - cur.xp;
    const span = nxt ? (nxt.xp - cur.xp) : (xpFromCur || 1);
    const pct = nxt ? Math.min(100, Math.round((xpFromCur / span) * 100)) : 100;
    const streakHeat = state.streak >= 30 ? 'inferno' : state.streak >= 7 ? 'hot' : state.streak > 0 ? 'warm' : 'cold';

    return (
      <header className="topbar">
        <div className="brand">
          <span className="logo">🐧</span>
          <h1>lernex</h1>
        </div>

        <div className="hud">
          <div className="hud-cell hud-level" title="Level">
            <span className="hud-label">lvl</span>
            <span className="hud-lvl-num">{cur.lvl}</span>
            <span className="hud-rank">{cur.name}</span>
          </div>

          <div className="hud-cell hud-xp" title="XP — earn by playing">
            <div className="xp-bar-wrap">
              <div className="xp-bar" style={{ width: pct + '%' }} />
              <span className="xp-text">{nxt ? `${state.xp} / ${nxt.xp} xp` : `${state.xp} xp · MAX`}</span>
            </div>
          </div>

          <div className={`hud-cell hud-streak streak-${streakHeat}`} title="Daily streak">
            <span className="streak-flame" key={state.streak}>🔥</span>
            <span className="streak-count">{state.streak}</span>
            <span className="hud-label">day{state.streak === 1 ? '' : 's'}</span>
          </div>

          <div className="hud-cell hud-actions">
            <button
              className={`icon-btn ${sound.on ? 'on' : 'off'}`}
              title={sound.on ? 'sound on (click to mute)' : 'sound muted (click to unmute)'}
              onClick={() => { sound.toggle(); sound.play('click'); }}>
              {sound.on ? '♪' : '♪̸'}
            </button>
            <button
              className="icon-btn"
              title="reset all progress"
              onClick={() => { if (confirm("reset ALL progress? this can't be undone fr.")) onReset(); }}>
              ↺
            </button>
          </div>
        </div>
      </header>
    );
  }

  // ============================================================
  //  TABS
  // ============================================================
  const TABS = [
    { id: 'home',     label: '🏠 home' },
    { id: 'cards',    label: '🃏 flashcards' },
    { id: 'quiz',     label: '🧠 quiz' },
    { id: 'terminal', label: '💻 terminal' },
    { id: 'bash',     label: '⚡ bash gym' },
    { id: 'ports',    label: '🔌 port match' },
    { id: 'fs',       label: '📁 filesystem' },
  ];

  function Tabs({ mode, setMode }) {
    return (
      <nav className="tabs">
        {TABS.map(t =>
          <button key={t.id}
            className={`tab ${mode === t.id ? 'active' : ''}`}
            onClick={() => setMode(t.id)}>{t.label}</button>
        )}
      </nav>
    );
  }

  // ============================================================
  //  HOME
  // ============================================================
  function Home({ state, setMode }) {
    const cards = [
      { id: 'cards',    icon: '🃏', title: 'flashcards', desc: 'flip cards for filesystem, commands, networking, OS concepts. swipe to learn.', xp: '+2 xp / card' },
      { id: 'quiz',     icon: '🧠', title: 'quiz',       desc: 'multiple-choice questions. instant feedback. test ur galaxy brain.', xp: '+5 xp / right' },
      { id: 'terminal', icon: '💻', title: 'terminal',   desc: 'type real commands. fake terminal grades u. learn by doing.', xp: '+10 xp / task' },
      { id: 'bash',     icon: '⚡', title: 'bash gym',   desc: 'write actual bash one-liners + scripts. loops, conditionals, sed/awk. lvl up.', xp: '+5–30 xp / exercise' },
      { id: 'ports',    icon: '🔌', title: 'port match', desc: 'match common ports to services. ssh=22, https=443, etc.', xp: '+3 xp / match' },
      { id: 'fs',       icon: '📁', title: 'filesystem', desc: 'click thru the linux directory tree. learn what /etc /var /usr actually do.', xp: 'explore freely' },
    ];

    const stats = [
      { label: 'cards learned',  val: `${Object.keys(state.cardsSeen).length} / ${DATA.flashcards.length}` },
      { label: 'quiz correct',   val: state.quizCorrect },
      { label: 'quiz attempted', val: state.quizSeen },
      { label: 'term tasks',     val: `${Object.keys(state.termDone).length} / ${DATA.terminal.length}` },
      { label: 'bash gym',       val: `${Object.keys(state.bashDone).length} / ${DATA.bashGym.length}` },
      { label: 'fs explored',    val: `${Object.keys(state.fsVisited).length} / ${DATA.filesystem.length}` },
      { label: 'port rounds',    val: state.portsRounds },
      { label: 'streak',         val: `🔥 ${state.streak}` },
    ];

    return (
      <section className="mode active">
        <div className="hero">
          <h2>lernex</h2>
          <p className="tagline">learn linux, OS, networking, and bash without dying of boredom. no cap.</p>
        </div>
        <div className="mode-grid">
          {cards.map((c, i) =>
            <button key={c.id} className="mode-card" data-num={String(i+1).padStart(2,'0')} onClick={() => setMode(c.id)}>
              <div className="mc-icon">{c.icon}</div>
              <h3>{c.title}</h3>
              <p>{c.desc}</p>
              <span className="mc-xp">{c.xp}</span>
            </button>
          )}
        </div>
        <div className="progress-summary">
          <h3>ur progress</h3>
          <div className="prog-grid">
            {stats.map(s =>
              <div key={s.label} className="prog-item">
                <div className="pi-label">{s.label}</div>
                <div className="pi-val">{s.val}</div>
              </div>
            )}
          </div>
        </div>
      </section>
    );
  }

  // ============================================================
  //  FLASHCARDS
  // ============================================================
  function Cards({ state, setState, addXP, showToast }) {
    const sound = useSound();
    const [cat, setCat] = useState('all');
    const list = useMemo(() => cat === 'all' ? DATA.flashcards : DATA.flashcards.filter(c => c.cat === cat), [cat]);
    const [idx, setIdx] = useState(0);
    const [flipped, setFlipped] = useState(false);
    const [swipeOffset, setSwipeOffset] = useState(0);
    const touchStart = useRef(null);

    useEffect(() => { setIdx(0); setFlipped(false); }, [cat]);

    const c = list[idx] || DATA.flashcards[0];
    const id = `${c.cat}|${c.front}`;
    const learned = !!state.cardsSeen[id];

    const prev = () => { setIdx((idx - 1 + list.length) % list.length); setFlipped(false); sound.play('click'); };
    const next = () => { setIdx((idx + 1) % list.length); setFlipped(false); sound.play('click'); };
    const flip = () => { setFlipped(f => !f); sound.play('flip'); };
    const mark = () => {
      if (!learned) {
        setState(s => ({ ...s, cardsSeen: { ...s.cardsSeen, [id]: true } }));
        addXP(2);
        sound.play('xp');
        showToast(`+2 xp · ${pick(DATA.hype)}`, 'xp');
      } else {
        showToast('already learned this one ✓');
      }
      setTimeout(next, 350);
    };

    // Keyboard navigation
    useEffect(() => {
      const onKey = (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
        if (e.key === 'ArrowLeft') prev();
        else if (e.key === 'ArrowRight') next();
        else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
        else if (e.key.toLowerCase() === 'g') mark();
      };
      window.addEventListener('keydown', onKey);
      return () => window.removeEventListener('keydown', onKey);
    });

    // Touch swipe
    const onTouchStart = (e) => { const t = e.touches[0]; touchStart.current = { x: t.clientX, y: t.clientY, t: Date.now() }; };
    const onTouchMove = (e) => {
      if (!touchStart.current) return;
      const dx = e.touches[0].clientX - touchStart.current.x;
      setSwipeOffset(Math.max(-150, Math.min(150, dx)));
    };
    const onTouchEnd = (e) => {
      if (!touchStart.current) return;
      const dx = (e.changedTouches[0]?.clientX || 0) - touchStart.current.x;
      const dy = (e.changedTouches[0]?.clientY || 0) - touchStart.current.y;
      const dt = Date.now() - touchStart.current.t;
      touchStart.current = null;
      setSwipeOffset(0);
      if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0) prev(); else next();
      } else if (dt < 250 && Math.abs(dx) < 10 && Math.abs(dy) < 10) {
        flip();
      }
    };

    return (
      <section className="mode active">
        <div className="cards-toolbar">
          <label className="cat-pick">
            category:
            <select value={cat} onChange={e => setCat(e.target.value)}>
              <option value="all">all</option>
              <option value="filesystem">filesystem</option>
              <option value="commands">commands</option>
              <option value="perms">permissions</option>
              <option value="process">processes</option>
              <option value="os">OS concepts</option>
              <option value="net">networking</option>
              <option value="pkg">package mgmt</option>
              <option value="tools">tools & shells</option>
              <option value="bash">bash scripting</option>
              <option value="text">text processing</option>
              <option value="sec">security</option>
              <option value="sched">scheduling</option>
              <option value="mem">memory & VM</option>
              <option value="ipc">ipc & sync</option>
              <option value="asm">assembly</option>
            </select>
          </label>
          <span className="counter">card {idx+1} / {list.length}{learned ? ' ✓' : ''}</span>
        </div>
        <div className="card-stage"
             onTouchStart={onTouchStart}
             onTouchMove={onTouchMove}
             onTouchEnd={onTouchEnd}>
          <div className={`flashcard ${flipped ? 'flipped' : ''} ${learned ? 'learned' : ''}`}
               style={{ transform: `translateX(${swipeOffset}px) ${flipped ? 'rotateY(180deg)' : ''}`, opacity: 1 - Math.abs(swipeOffset)/300 }}
               onClick={flip}>
            <div className="card-face card-front">
              <div className="card-cat-tag">{c.cat}</div>
              <div className="card-term">{c.front}</div>
              <div className="card-hint">tap to flip · swipe to navigate</div>
            </div>
            <div className="card-face card-back">
              <div className="card-explain">{c.back}</div>
              <div className="card-vibe">{c.vibe}</div>
            </div>
          </div>
        </div>
        <div className="card-controls">
          <button className="btn ghost" onClick={prev} aria-label="previous">← prev</button>
          <button className="btn primary" onClick={mark}>{learned ? 'got it ✓' : 'got it ✓ (+2 xp)'}</button>
          <button className="btn ghost" onClick={next} aria-label="next">next →</button>
        </div>
        <div className="kbd-hint">keys: ← prev · → next · space flip · g got it</div>
      </section>
    );
  }

  // ============================================================
  //  QUIZ
  // ============================================================
  const QUIZ_SIZE = 10;
  function Quiz({ state, setState, addXP, showToast }) {
    const sound = useSound();
    const [deck, setDeck] = useState(() => shuffle(DATA.quiz).slice(0, QUIZ_SIZE));
    const [pos, setPos] = useState(0);
    const [score, setScore] = useState(0);
    const [picked, setPicked] = useState(null); // index of picked option
    const [done, setDone] = useState(false);
    const [combo, setCombo] = useState(0);
    const [bestCombo, setBestCombo] = useState(0);

    const restart = () => {
      setDeck(shuffle(DATA.quiz).slice(0, QUIZ_SIZE));
      setPos(0); setScore(0); setPicked(null); setDone(false); setCombo(0); setBestCombo(0);
    };

    if (done) {
      const perfect = score === deck.length;
      const bonus = perfect ? 20 : (score >= deck.length * 0.8 ? 10 : 0);
      return (
        <section className="mode active">
          <div className="quiz-done">
            <h2>{perfect ? 'PERFECT RUN 🏆' : 'quiz complete'}</h2>
            <p className="quiz-done-score">{score} <span>/ {deck.length}</span></p>
            <p className="quiz-done-msg">{
              perfect ? '+20 bonus xp · ur built different' :
              bonus ? '+10 bonus xp · clean work' : 'shake it off, run it back'
            }</p>
            {bestCombo >= 3 && <p className="quiz-done-combo">🔥 best combo: {bestCombo}x</p>}
            <button className="btn primary" onClick={restart}>play again →</button>
          </div>
        </section>
      );
    }

    const q = deck[pos];
    const answer = (i) => {
      if (picked !== null) return;
      setPicked(i);
      setState(s => ({ ...s, quizSeen: s.quizSeen + 1, quizCorrect: i === q.answer ? s.quizCorrect + 1 : s.quizCorrect }));
      if (i === q.answer) {
        setScore(s => s + 1);
        const newCombo = combo + 1;
        setCombo(newCombo);
        if (newCombo > bestCombo) setBestCombo(newCombo);
        sound.play('correct');
        let xp = 5;
        if (newCombo === 3) { xp += 3; showToast('🔥 3x combo · +3 bonus xp', 'xp'); }
        else if (newCombo === 5) { xp += 5; showToast('⚡ 5x combo · +5 bonus xp', 'xp'); fireConfetti({ particleCount: 40, spread: 50, origin: { y: 0.7 } }); }
        else if (newCombo === 10) { xp += 15; showToast('💎 10x COMBO · +15 bonus xp', 'xp'); fireConfetti(); }
        addXP(xp);
      } else {
        setCombo(0);
        sound.play('wrong');
      }
    };

    const goNext = () => {
      if (pos + 1 >= deck.length) {
        const finalScore = score;
        const finishBonus = finalScore === deck.length ? 20 : (finalScore >= deck.length * 0.8 ? 10 : 0);
        if (finishBonus) addXP(finishBonus);
        setDone(true);
      } else {
        setPos(p => p + 1);
        setPicked(null);
      }
    };

    const isCorrect = picked === q.answer;

    return (
      <section className="mode active">
        <div className="quiz-head">
          <span className="counter">q {pos+1} / {deck.length}</span>
          <span className="counter">score: {score}</span>
          {combo >= 2 && <span className={`combo-pill combo-${Math.min(10, combo)}`} key={combo}>🔥 {combo}x combo</span>}
        </div>
        <div className="quiz-progress"><div className="quiz-progress-fill" style={{ width: ((pos / deck.length) * 100) + '%' }} /></div>
        <div className="quiz-card">
          <h3 className="quiz-q">{q.q}</h3>
          <div className="quiz-options">
            {q.options.map((opt, i) =>
              <button key={i}
                className={`opt ${picked !== null && i === q.answer ? 'correct' : ''} ${picked === i && i !== q.answer ? 'wrong' : ''}`}
                disabled={picked !== null}
                onClick={() => answer(i)}>{opt}</button>
            )}
          </div>
          {picked !== null && (
            <div className={`quiz-feedback ${isCorrect ? 'good' : 'bad'}`}>
              <strong>{isCorrect ? pick(DATA.hype) : pick(DATA.sad)}</strong><br/>{q.explain}
            </div>
          )}
          {picked !== null && (
            <button className="btn primary" onClick={goNext}>{pos + 1 >= deck.length ? 'see results →' : 'next question →'}</button>
          )}
        </div>
      </section>
    );
  }

  // ============================================================
  //  TERMINAL
  // ============================================================
  const normalizeCmd = (s) => s.replace(/\s+/g, ' ').trim();

  function Terminal({ state, setState, addXP, showToast }) {
    const pickUndone = () => {
      const undone = DATA.terminal.map((_, i) => i).filter(i => !state.termDone[i]);
      return undone.length ? pick(undone) : Math.floor(Math.random() * DATA.terminal.length);
    };
    const [idx, setIdx] = useState(pickUndone);
    const [lines, setLines] = useState([]);
    const [input, setInput] = useState('');
    const [hintOn, setHintOn] = useState(false);
    const inputRef = useRef(null);
    const outputRef = useRef(null);

    const t = DATA.terminal[idx];

    useEffect(() => {
      setLines([{ cls: 'sys', text: `welcome to fakeOS 0.1 — type a command, hit enter (hint: ${t.hint.slice(0,60)}${t.hint.length>60?'...':''})` }]);
      setInput('');
      setHintOn(false);
      inputRef.current?.focus();
    }, [idx]);

    useEffect(() => {
      if (outputRef.current) outputRef.current.scrollTop = outputRef.current.scrollHeight;
    }, [lines]);

    const submit = (e) => {
      if (e.key !== 'Enter') return;
      const raw = input;
      if (!raw.trim()) return;
      const newLines = [...lines, { cls: 'user', text: `alice@fakeOS:~$ ${raw}` }];
      setInput('');
      const norm = normalizeCmd(raw);
      const ok = t.accept.some(a => normalizeCmd(a) === norm);
      if (ok) {
        newLines.push({ cls: 'ok', text: t.output });
        newLines.push({ cls: 'ok', text: `✓ ${pick(DATA.hype)} · ${t.vibe}` });
        setLines(newLines);
        if (!state.termDone[idx]) {
          setState(s => ({ ...s, termDone: { ...s.termDone, [idx]: true } }));
          addXP(10);
          showToast(`+10 xp · ${pick(DATA.hype)}`, 'xp');
        } else {
          showToast('already nailed this one ✓');
        }
        setTimeout(() => setIdx(pickUndone()), 1400);
      } else {
        newLines.push({ cls: 'err', text: `bash: ${raw.split(' ')[0]}: not what we want here — try again` });
        newLines.push({ cls: 'sys', text: `  ${pick(DATA.sad)} (tap hint below 💡)` });
        setLines(newLines);
      }
    };

    return (
      <section className="mode active">
        <div className="term-head">
          <span className="counter">task {idx+1} / {DATA.terminal.length}</span>
          <button className="btn ghost small" onClick={() => setIdx((idx+1) % DATA.terminal.length)}>skip →</button>
        </div>
        <div className="term-task">
          <span className="task-label">ur mission:</span>
          <span className="task-text">{t.task}</span>
        </div>
        <div className="terminal">
          <div className="term-output" ref={outputRef}>
            {lines.map((l, i) => <span key={i} className={`term-line ${l.cls}`}>{l.text}</span>)}
          </div>
          <div className="term-input-line">
            <span className="prompt">alice@fakeOS:~$</span>
            <input ref={inputRef}
              className="term-input"
              autoComplete="off" spellCheck="false" autoCapitalize="off"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={submit}/>
          </div>
        </div>
        <button className="btn ghost small" onClick={() => setHintOn(h => !h)}>{hintOn ? 'hide hint' : 'show hint 💡'}</button>
        {hintOn && <div className="hint-text">💡 {t.hint}</div>}
      </section>
    );
  }

  // ============================================================
  //  BASH GYM
  // ============================================================
  const normalizeBash = (s) => s
    .split('\n')
    .map(l => l.split('#')[0])
    .map(l => l.replace(/\s+/g, ' ').trim())
    .filter(l => l.length > 0)
    .join('\n')
    .toLowerCase();

  const bashCheck = (raw, patterns) => {
    const n = normalizeBash(raw);
    return patterns.some(p => {
      if (p instanceof RegExp) {
        if (p.test(n)) return true;
        return n.split('\n').some(line => p.test(line));
      }
      return normalizeBash(p) === n;
    });
  };

  function BashGym({ state, setState, addXP, showToast }) {
    const [idx, setIdx] = useState(0);
    const [code, setCode] = useState('');
    const [feedback, setFeedback] = useState(null); // {kind, html}
    const [explainOn, setExplainOn] = useState(false);

    const b = DATA.bashGym[idx];

    useEffect(() => {
      setCode(b.starter || '');
      setFeedback(null);
      setExplainOn(false);
    }, [idx]);

    const run = () => {
      if (!code.trim()) {
        setFeedback({ kind: 'info', text: '✏️ write something first king' });
        return;
      }
      const ok = bashCheck(code, b.accept);
      if (ok) {
        setFeedback({ kind: 'good', text: `✓ ${pick(DATA.hype)}` });
        setExplainOn(true);
        if (!state.bashDone[idx]) {
          setState(s => ({ ...s, bashDone: { ...s.bashDone, [idx]: true } }));
          addXP(b.xp);
          showToast(`+${b.xp} xp · ${pick(DATA.hype)}`, 'xp');
        } else {
          showToast('already cleared ✓');
        }
      } else {
        setFeedback({ kind: 'bad', text: `not quite. ${pick(DATA.sad)}. tap "show hint" or "reveal solution" 💡` });
      }
    };

    const showHint = () => setFeedback({ kind: 'info', text: `💡 hint: ${b.hint}` });
    const showSolution = () => {
      setFeedback({ kind: 'info', solution: b.solution, text: '📜 solution:' });
      setExplainOn(true);
    };
    const reset = () => { setCode(b.starter || ''); setFeedback(null); setExplainOn(false); };

    const onKeyDown = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        run();
      }
      if (e.key === 'Tab') {
        e.preventDefault();
        const ta = e.target;
        const s = ta.selectionStart, en = ta.selectionEnd;
        const nv = ta.value.slice(0, s) + '  ' + ta.value.slice(en);
        setCode(nv);
        requestAnimationFrame(() => { ta.selectionStart = ta.selectionEnd = s + 2; });
      }
    };

    return (
      <section className="mode active">
        <div className="bash-head">
          <div className="bash-meta">
            <span className="counter">exercise {idx+1} / {DATA.bashGym.length}</span>
            <span className={`level-tag ${b.level}`}>{b.level}</span>
            <span className="counter">+{b.xp} xp</span>
            {state.bashDone[idx] && <span className="counter" style={{color:'#2dd882', borderColor:'#2dd882'}}>✓ done</span>}
          </div>
          <div className="bash-nav">
            <button className="btn ghost small" onClick={() => setIdx((idx-1+DATA.bashGym.length) % DATA.bashGym.length)}>← prev</button>
            <button className="btn ghost small" onClick={() => setIdx((idx+1) % DATA.bashGym.length)}>next →</button>
          </div>
        </div>
        <div className="bash-card">
          <h3 className="bash-title">{idx+1}. {b.title}</h3>
          <p className="bash-task">{b.task}</p>
          <div className="bash-editor-wrap">
            <div className="editor-label">ur code (bash): ⌘/Ctrl+Enter to check</div>
            <textarea className="bash-editor"
              spellCheck="false" autoCapitalize="off"
              placeholder="# write ur bash here..."
              value={code}
              onChange={e => setCode(e.target.value)}
              onKeyDown={onKeyDown}/>
          </div>
          <div className="bash-controls">
            <button className="btn primary" onClick={run}>check ✓</button>
            <button className="btn ghost" onClick={showHint}>show hint 💡</button>
            <button className="btn ghost" onClick={showSolution}>reveal solution</button>
            <button className="btn ghost" onClick={reset}>reset</button>
          </div>
          {feedback && (
            <div className={`bash-feedback ${feedback.kind}`}>
              <strong>{feedback.text}</strong>
              {feedback.solution && (
                <div style={{marginTop:'8px'}}>
                  <code style={{background:'#04040c', color:'#00e5ff', padding:'4px 10px', borderRadius:'6px', fontFamily:'monospace', display:'inline-block'}}>{feedback.solution}</code>
                </div>
              )}
            </div>
          )}
          {explainOn && (
            <div className="bash-explain">
              <strong>why this works:</strong> {b.explain}
            </div>
          )}
        </div>
      </section>
    );
  }

  // ============================================================
  //  PORTS
  // ============================================================
  function Ports({ state, setState, addXP, showToast }) {
    const [round, setRound] = useState(() => shuffle(DATA.ports).slice(0, 6));
    const [numbersOrder, setNumbersOrder] = useState(() => shuffle(round));
    const [servicesOrder, setServicesOrder] = useState(() => shuffle(round));
    const [selected, setSelected] = useState(null);
    const [matched, setMatched] = useState({}); // {port: true}
    const [wrongFlash, setWrongFlash] = useState(null); // port being flashed
    const [feedback, setFeedback] = useState('');

    const newRound = () => {
      const r = shuffle(DATA.ports).slice(0, 6);
      setRound(r);
      setNumbersOrder(shuffle(r));
      setServicesOrder(shuffle(r));
      setSelected(null);
      setMatched({});
      setFeedback('');
    };

    const selectPort = (port) => {
      if (matched[port]) return;
      setSelected(port);
    };

    const attemptMatch = (srvPort) => {
      if (matched[srvPort]) return;
      if (selected === null) { setFeedback('pick a port first ☝️'); return; }
      if (selected === srvPort) {
        const newMatched = { ...matched, [srvPort]: true };
        setMatched(newMatched);
        setSelected(null);
        addXP(3);
        showToast(`+3 xp · ${pick(DATA.hype)}`, 'xp');
        setFeedback('');
        if (Object.keys(newMatched).length === round.length) {
          setState(s => ({ ...s, portsRounds: s.portsRounds + 1 }));
          addXP(10);
          showToast('round cleared · +10 bonus xp 🎯', 'xp', 2500);
        }
      } else {
        setWrongFlash(srvPort);
        setFeedback(`❌ ${pick(DATA.sad)}`);
        setTimeout(() => setWrongFlash(null), 400);
      }
    };

    const matchedCount = Object.keys(matched).length;

    return (
      <section className="mode active">
        <div className="ports-head">
          <p className="instr">tap a <strong>port number</strong>, then tap its matching <strong>service</strong>.</p>
          <span className="counter">matched: {matchedCount} / {round.length}</span>
          <button className="btn primary small" onClick={newRound}>new round</button>
        </div>
        <div className="ports-board">
          <div className="ports-col">
            <h4>ports</h4>
            <div>
              {numbersOrder.map(p =>
                <div key={p.port}
                  className={`port-num ${selected === p.port ? 'selected' : ''} ${matched[p.port] ? 'matched' : ''}`}
                  onClick={() => selectPort(p.port)}>{p.port}</div>
              )}
            </div>
          </div>
          <div className="ports-col">
            <h4>services</h4>
            <div>
              {servicesOrder.map(p =>
                <div key={p.port}
                  className={`port-srv ${matched[p.port] ? 'matched' : ''} ${wrongFlash === p.port ? 'wrong-flash' : ''}`}
                  onClick={() => attemptMatch(p.port)}>
                  {p.service}<span className="srv-port">{p.note}</span>
                </div>
              )}
            </div>
          </div>
        </div>
        <div className="ports-feedback">{feedback}</div>
      </section>
    );
  }

  // ============================================================
  //  FILESYSTEM EXPLORER
  // ============================================================
  function FileSystem({ state, setState, addXP }) {
    const [current, setCurrent] = useState('/');

    const visit = (path) => {
      setCurrent(path);
      if (!state.fsVisited[path]) {
        setState(s => ({ ...s, fsVisited: { ...s.fsVisited, [path]: true } }));
        addXP(1, { skipStreak: false });
      }
    };

    // Build tree order: root, then top-level + nested
    const tree = useMemo(() => {
      const root = DATA.filesystem.find(e => e.path === '/');
      const top = DATA.filesystem
        .filter(e => e.path !== '/' && e.path.lastIndexOf('/') === 0)
        .sort((a, b) => a.path.localeCompare(b.path));
      const out = [{ entry: root, indent: false }];
      for (const e of top) {
        out.push({ entry: e, indent: false });
        const nested = DATA.filesystem.filter(x => x.path.startsWith(e.path + '/'));
        for (const n of nested) out.push({ entry: n, indent: true });
      }
      return out;
    }, []);

    const e = DATA.filesystem.find(x => x.path === current) || DATA.filesystem[0];

    return (
      <section className="mode active">
        <div className="fs-head">
          <p className="instr">click any directory to learn what lives inside. +1 xp per new dir.</p>
          <div className="fs-breadcrumb">{current}</div>
        </div>
        <div className="fs-board">
          <div className="fs-tree-col">
            <h4>directories</h4>
            <div className="fs-tree">
              {tree.map(({ entry, indent }) =>
                <button key={entry.path}
                  className={`fs-item ${indent ? 'indent' : ''} ${state.fsVisited[entry.path] ? 'visited' : ''} ${current === entry.path ? 'active' : ''}`}
                  onClick={() => visit(entry.path)}>{entry.path}</button>
              )}
            </div>
          </div>
          <div className="fs-info-col">
            <div className="fs-card">
              <div className="fs-path">{e.path}</div>
              <div className="fs-summary">{e.summary}</div>
              {e.vibe && <div className="fs-vibe">{e.vibe}</div>}
            </div>
          </div>
        </div>
      </section>
    );
  }

  // ============================================================
  //  TOAST + LEVEL UP MODAL
  // ============================================================
  function Toast({ toast }) {
    return (
      <div className={`toast ${toast ? toast.kind : ''} ${toast ? 'show' : ''}`}>
        {toast?.msg}
      </div>
    );
  }

  function LevelUpModal({ data, onClose }) {
    const sound = useSound();
    useEffect(() => {
      if (!data) return;
      fireLevelConfetti();
      sound.play('levelUp');
    }, [data]);
    if (!data) return null;
    return (
      <div className="modal" onClick={(e) => { if (e.target.classList.contains('modal')) onClose(); }}>
        <div className="modal-content level-up">
          <div className="modal-burst">⚡</div>
          <h2>LEVEL UP</h2>
          <p className="modal-sub">you are now</p>
          <p className="big-rank">{data.rank}</p>
          <p className="big-rank-lvl">lvl {data.lvl}</p>
          <button className="btn primary" onClick={() => { sound.play('click'); onClose(); }}>slay →</button>
        </div>
      </div>
    );
  }

  // ============================================================
  //  APP ROOT
  // ============================================================
  function App() {
    const game = useGame();
    const [mode, setMode] = useState('home');
    const welcomed = useRef(false);

    useEffect(() => {
      if (welcomed.current) return;
      welcomed.current = true;
      const today = todayStr();
      if (game.state.lastActive === null) {
        setTimeout(() => game.showToast('first session! do anything to start a streak 🔥', '', 3200), 800);
      } else if (game.state.lastActive !== today) {
        const diff = dayDiff(game.state.lastActive, today);
        if (diff === 1) setTimeout(() => game.showToast(`welcome back! keep that 🔥 ${game.state.streak}-day streak going`, '', 3000), 800);
        else if (diff > 1) setTimeout(() => game.showToast(`streak reset. new run starts now 💪`, 'bad', 3000), 800);
      }
    }, []);

    const props = {
      state: game.state,
      setState: game.setState,
      addXP: game.addXP,
      showToast: game.showToast,
    };

    return (
      <>
        <TopBar state={game.state} onReset={game.reset} />
        <Tabs mode={mode} setMode={(m) => { setMode(m); window.scrollTo({top:0, behavior:'smooth'}); }} />
        <main>
          {mode === 'home'     && <Home state={game.state} setMode={setMode} />}
          {mode === 'cards'    && <Cards {...props} />}
          {mode === 'quiz'     && <Quiz {...props} />}
          {mode === 'terminal' && <Terminal {...props} />}
          {mode === 'bash'     && <BashGym {...props} />}
          {mode === 'ports'    && <Ports {...props} />}
          {mode === 'fs'       && <FileSystem {...props} />}
        </main>
        <footer className="footsig">
          <span>made by</span>
          <a href="#" onClick={(e) => e.preventDefault()}>Prashant Kumar</a>
          <span>· no login · progress lives in ur browser</span>
        </footer>
        <Toast toast={game.toast} />
        <LevelUpModal data={game.levelUp} onClose={() => game.setLevelUp(null)} />
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(
    <SoundProvider><App /></SoundProvider>
  );

  </script>
</body>
</html>
